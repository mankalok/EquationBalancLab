<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>兩步方程：自由探索工具</title>
    <style>
        :root { --main-color: #3498db; --success-color: #2ecc71; --error-color: #e74c3c; --y-color: #f39c12; --item-v: #9b59b6; --joint-color: #6c5ce7; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-x: hidden; position: relative; touch-action: manipulation; }

        .index-btn { position: fixed; top: 20px; right: 20px; padding: 10px 20px; background: #34495e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 1000; text-decoration: none; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .header-title { background: #dee2e6; color: #2c3e50; padding: 15px 40px; border-radius: 10px; margin-bottom: 20px; font-size: 28px; font-weight: bold; display: flex; align-items: center; gap: 10px; border: 2px solid #bdc3c7; }
        
        .layout-container { display: flex; width: 100%; max-width: 1200px; gap: 30px; align-items: flex-start; }
        
        /* 針對手機打直的基礎佈局調整 */
        @media (max-width: 600px) {
            .layout-container { flex-direction: column; align-items: center; }
            .header-title { font-size: 20px; padding: 10px 20px; }
            .eq-line { font-size: 24px; }
            .frac { font-size: 24px; }
        }

        .main-game { flex: 2; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .eq-panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; margin-bottom: 15px; }
        .eq-line { display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; height: 60px; }
        .side-display { flex: 1; display: flex; justify-content: center; align-items: center; }
        .frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; line-height: 1; font-size: 32px; }
        .frac .top { border-bottom: 3px solid black; padding: 0 5px; }

        .step-sidebar { flex: 1.5; background: #fff; border: 3px solid var(--success-color); border-radius: 20px; padding: 25px; display: none; box-shadow: 0 10px 30px rgba(46, 204, 113, 0.2); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .step-table { width: 100%; font-size: 22px; font-weight: bold; border-collapse: collapse; }
        .step-table td { padding: 8px 0; }
        .td-r { text-align: right; width: 48%; }
        .td-c { text-align: center; width: 4%; color: #bdc3c7; }
        .td-l { text-align: left; width: 48%; }
        .highlight { color: var(--y-color); font-size: 30px; }
        .process-row { color: #e74c3c; font-size: 18px; }

        /* 天秤容器修正 */
        #stage { position: relative; width: 100%; height: 380px; display: flex; justify-content: center; margin-top: 20px; }
        .beam-wrap { position: absolute; top: 60px; width: 560px; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .beam { width: 100%; height: 12px; background: #bdc3c7; border-radius: 6px; display: flex; justify-content: space-between; }
        .basket { width: 260px; min-height: 250px; background: rgba(255,255,255,0.8); border: 4px solid #34495e; border-top: none; border-radius: 0 0 25px 25px; padding: 12px; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px; }
        .item { height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; transition: transform 0.1s; user-select: none; }
        .item-y-part { width: 45px; background: var(--y-color); border: 2px dashed white; font-size: 16px; }
        .item-y-full { width: 100%; background: var(--y-color); border: 3px solid white; box-shadow: 0 4px 0 #d35400; font-size: 24px; }
        .item-v { width: 45px; background: var(--item-v); font-size: 20px; }

        /* 核心修正：手機打直時天秤及籃子的寬度自適應 */
        @media (max-width: 600px) {
            .beam-wrap { width: 95%; max-width: 560px; }
            .basket { width: 46%; min-height: 200px; padding: 6px; gap: 4px; }
            .item { height: 35px; }
            .item-y-part, .item-v { width: 35px; font-size: 14px; }
            .item-y-full { font-size: 18px; }
            #stage { height: 320px; }
        }

        .manual-controls-table { width: 100%; max-width: 800px; margin-top: 20px; background: #eef2f3; border-radius: 15px; border-collapse: separate; border-spacing: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .ctrl-cell { vertical-align: top; width: 33.33%; background: white; padding: 15px; border-radius: 12px; box-shadow: inset 0 0 5px rgba(0,0,0,0.05); }
        .ctrl-label { font-size: 16px; font-weight: bold; color: #2c3e50; text-align: center; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        
        .btn-stack { display: flex; flex-direction: column; gap: 8px; }
        button { padding: 10px 12px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        
        @media (max-width: 600px) {
            .manual-controls-table { border-spacing: 8px; margin-top: 10px; }
            .ctrl-cell { padding: 8px; }
            .ctrl-label { font-size: 14px; }
            button { font-size: 13px; padding: 8px 5px; }
        }

        .btn-left { background: var(--main-color); box-shadow: 0 3px 0 #2980b9; }
        .btn-right { background: #27ae60; box-shadow: 0 3px 0 #219150; }
        .btn-joint { background: var(--joint-color); box-shadow: 0 3px 0 #5b4cc4; }
        
        button:active { transform: translateY(2px); box-shadow: none; }
        
        .bottom-nav { display: flex; gap: 20px; margin-top: 20px; }
        .btn-reset { background: #95a5a6; box-shadow: 0 4px 0 #7f8c8d; padding: 12px 30px; font-size: 18px; }
        
        select { padding: 8px; border-radius: 5px; font-size: 16px; font-weight: bold; border: 2px solid #ddd; width: 60px; }
    </style>
</head>
<body>

<a href="index.html" class="index-btn">返回主頁</a>

<div class="header-title" id="level-title">探索題目：<div class="frac"><span class="top">y</span><span>3</span></div> + 1 = 6</div>

<div class="layout-container">
    <div class="main-game">
        <div style="color: #7f8c8d; font-weight: bold; margin-bottom: 10px;">點擊籃內物件可個別刪除</div>
        
        <div class="eq-panel">
            <div class="eq-line">
                <div class="side-display" id="disp-L"></div>
                <div style="width:60px; text-align:center" id="eq-op">=</div>
                <div class="side-display" id="disp-R"></div>
            </div>
        </div>

        <div id="stage">
            <div class="beam-wrap" id="beam">
                <div class="beam">
                    <div class="basket" id="basket-L"></div>
                    <div class="basket" id="basket-R"></div>
                </div>
            </div>
        </div>

        <table class="manual-controls-table">
            <tr>
                <td class="ctrl-cell">
                    <div class="ctrl-label">針對左邊</div>
                    <div class="btn-stack">
                        <button class="btn-left" onclick="addPartL()">+ y/3</button>
                        <button class="btn-left" onclick="subOneL()">- 1</button>
                        <button class="btn-left" onclick="addFullSetL()">+ y/3 + 1</button>
                    </div>
                </td>
                <td class="ctrl-cell">
                    <div class="ctrl-label">針對右邊</div>
                    <div class="btn-stack" style="align-items: center; justify-content: center; height: 100%;">
                        <div style="display:flex; gap:5px; align-items:center; margin-bottom: 8px;">
                            <select id="right-num">
                                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                                <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                                <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                            </select>
                            <button class="btn-right" onclick="addOneR()">加入</button>
                        </div>
                        <button class="btn-right" style="width: 100%; background: #e67e22; box-shadow: 0 3px 0 #d35400;" onclick="subOneR()">- 1</button>
                    </div>
                </td>
                <td class="ctrl-cell">
                    <div class="ctrl-label">兩邊共用</div>
                    <div class="btn-stack">
                        <button class="btn-joint" onclick="bothSidesSub()">兩邊同時 - 1</button>
                        <button class="btn-joint" onclick="bothSidesMul()">兩邊同時 × 3</button>
                    </div>
                </td>
            </tr>
        </table>

        <div class="bottom-nav">
            <button class="btn-reset" onclick="resetLevel()">重置題目</button>
        </div>
    </div>

    <div class="step-sidebar" id="sidebar">
        <h3 style="text-align:center; color:var(--success-color); margin-top:0; font-size:26px;">解題思維總結</h3>
        <table class="step-table" id="summary-table"></table>
    </div>
</div>

<script>
    (function() {
        function touchHandler(event) {
            var touches = event.changedTouches, first = touches[0], type = "";
            switch(event.type) {
                case "touchstart": type = "mousedown"; break;
                case "touchmove":  type = "mousemove"; break;        
                case "touchend":   type = "mouseup";   break;
                default: return;
            }
            var simulatedEvent = document.createEvent("MouseEvent");
            simulatedEvent.initMouseEvent(type, true, true, window, 1, first.screenX, first.screenY, first.clientX, first.clientY, false, false, false, false, 0, null);
            first.target.dispatchEvent(simulatedEvent);
        }
        document.addEventListener("touchstart", touchHandler, true);
        document.addEventListener("touchmove", touchHandler, true);
        document.addEventListener("touchend", touchHandler, true);
        document.addEventListener("touchcancel", touchHandler, true);
    })();

    const level = { y_div: 3, add_v: 1, target_r: 6 };
    let state = { partsL: 0, onesL: 0, onesR: 0 };

    function initLevel() {
        state.partsL = 1; 
        state.onesL = level.add_v;
        state.onesR = level.target_r;
        document.getElementById('sidebar').style.display = 'none';
        update();
    }

    function addPartL() { state.partsL += 1; update(); }
    
    function subOneL() { 
        if (state.onesL > 0) {
            state.onesL -= 1; 
            update(); 
        }
    }

    function addFullSetL() { state.partsL += 1; state.onesL += 1; update(); }

    function addOneR() {
        const num = parseInt(document.getElementById('right-num').value);
        state.onesR += num;
        update();
    }

    function subOneR() {
        if (state.onesR > 0) {
            state.onesR -= 1;
            update();
        }
    }

    function bothSidesSub() {
        if (state.onesL > 0 && state.onesR > 0) {
            state.onesL -= 1;
            state.onesR -= 1;
            update();
        }
    }
    
    function bothSidesMul() {
        state.partsL *= level.y_div;
        state.onesL *= level.y_div;
        state.onesR *= level.y_div;
        update();
    }

    function removeItem(type) {
        if (type === 'fullY') state.partsL -= level.y_div;
        if (type === 'partL') state.partsL -= 1;
        if (type === 'oneL')  state.onesL -= 1;
        if (type === 'oneR')  state.onesR -= 1;
        update();
    }

    function update() {
        const lv = level;
        const bL = document.getElementById('basket-L');
        const bR = document.getElementById('basket-R');
        const fullY = Math.floor(state.partsL / lv.y_div);
        const remParts = state.partsL % lv.y_div;

        let hL = '';
        for(let i=0; i<fullY; i++) hL += `<div class="item item-y-full" onclick="removeItem('fullY')">y</div>`;
        for(let i=0; i<remParts; i++) hL += `<div class="item item-y-part" onclick="removeItem('partL')">y/${lv.y_div}</div>`;
        for(let i=0; i<state.onesL; i++) hL += `<div class="item item-v" onclick="removeItem('oneL')">1</div>`;
        bL.innerHTML = hL;

        let hR = '';
        for(let i=0; i<state.onesR; i++) hR += `<div class="item item-v" onclick="removeItem('oneR')">1</div>`;
        bR.innerHTML = hR;

        let txtL = "";
        if (fullY > 0) txtL += (fullY === 1 ? "y" : `${fullY}y`);
        if (remParts > 0) {
            let pStr = `<div class="frac"><span class="top">${remParts > 1 ? remParts : ''}y</span><span>${lv.y_div}</span></div>`;
            txtL += (txtL ? " + " + pStr : pStr);
        }
        if (state.onesL > 0) txtL += (txtL ? " + " : "") + state.onesL;
        if (!txtL) txtL = "0";

        document.getElementById('disp-L').innerHTML = txtL;
        document.getElementById('disp-R').innerHTML = state.onesR;

        const y_val = (lv.target_r - lv.add_v) * lv.y_div;
        const currentTotalL = (state.partsL * (y_val / lv.y_div)) + state.onesL;
        const currentTotalR = state.onesR;
        
        const angle = Math.min(20, Math.max(-20, (currentTotalR - currentTotalL) * 10));
        document.getElementById('beam').style.transform = `rotate(${angle}deg)`;

        const op = document.getElementById('eq-op');
        if (Math.abs(currentTotalL - currentTotalR) < 0.001) {
            op.innerText = "="; op.style.color = "var(--success-color)";
            if (fullY === 1 && remParts === 0 && state.onesL === 0 && state.onesR === y_val) {
                renderSummary(lv, y_val);
                document.getElementById('sidebar').style.display = 'block';
            }
        } else {
            op.innerText = currentTotalL > currentTotalR ? ">" : "<";
            op.style.color = "var(--error-color)";
        }
    }

    function renderSummary(lv, ans) {
        const midVal = lv.target_r - lv.add_v;
        const table = document.getElementById('summary-table');
        table.innerHTML = `
            <tr>
                <td class="td-r"><div class="frac"><span class="top">y</span><span>${lv.y_div}</span></div> + ${lv.add_v}</td>
                <td class="td-c">=</td>
                <td class="td-l">${lv.target_r}</td>
            </tr>
            <tr class="process-row">
                <td class="td-r"><div class="frac"><span class="top">y</span><span>${lv.y_div}</span></div> + ${lv.add_v} - ${lv.add_v}</td>
                <td class="td-c">=</td>
                <td class="td-l">${lv.target_r} - ${lv.add_v}</td>
            </tr>
            <tr>
                <td class="td-r"><div class="frac"><span class="top">y</span><span>${lv.y_div}</span></div></td>
                <td class="td-c">=</td>
                <td class="td-l">${midVal}</td>
            </tr>
            <tr class="process-row" style="color: #3498db;">
                <td class="td-r">(<div class="frac"><span class="top">y</span><span>${lv.y_div}</span></div>) × ${lv.y_div}</td>
                <td class="td-c">=</td>
                <td class="td-l">${midVal} × ${lv.y_div}</td>
            </tr>
            <tr class="highlight">
                <td class="td-r">y</td>
                <td class="td-c">=</td>
                <td class="td-l">${ans}</td>
            </tr>
        `;
    }

    function resetLevel() { initLevel(); }
    initLevel();
</script>
</body>
</html>
