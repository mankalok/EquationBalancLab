<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>趣味方程實驗室 - 索引頁</title>
    <style>
        /* 強制直向感：若偵測到橫向，顯示提示（可選） */
        @media screen and (orientation: landscape) and (max-width: 1024px) {
            /* 你可以選擇是否要在橫放時顯示提示，這裡先做佈局優化為主 */
        }

        body {
            margin: 0;
            padding: 10px; /* 縮減 padding 適配 iPad 直向寬度 */
            background-color: #e0f7fa;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            text-align: center;
            color: #2c3e50;
        }

        .container {
            max-width: 90%; /* 改用百分比，更適合 iPad */
            margin: 0 auto;
            background: #ffffff;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 8px solid #ffeb3b;
        }

        h1 {
            font-size: 28pt; /* 稍微縮細標題防止直向出界 */
            color: #ff5722;
            margin-bottom: 5px;
            text-shadow: 2px 2px #ffe0b2;
        }

        p.subtitle {
            font-size: 16pt;
            color: #4caf50;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* 關鍵：直向時改為 2 欄，按鈕才有足夠空間 */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px;
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 15px 10px;
            border-radius: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            cursor: pointer;
            height: 160px; /* 稍微調低高度 */
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }

        .num {
            font-size: 16pt;
            font-weight: bold;
            background: rgba(255,255,255,0.5);
            padding: 2px 10px;
            border-radius: 15px;
            margin-bottom: 5px;
        }

        /* 修改符號大小 */
        .symbol {
            font-size: 50pt; /* 基本符號縮細一點 */
            line-height: 1.1;
            margin: 5px 0;
            font-weight: 900;
            white-space: nowrap;
        }

        /* 針對 5-8 號雙符號按鈕進行縮放，防止出界 */
        .btn-composite .symbol {
            font-size: 38pt; /* 大幅縮細組合符號 */
            letter-spacing: -2px;
        }

        .text {
            font-size: 13pt;
            font-weight: bold;
            margin-top: 5px;
        }

        /* 按鈕顏色樣式 - 維持原樣 */
        .btn-1 { background-color: #ffadad; border: 4px solid #ff4d4d; color: #b71c1c; }
        .btn-2 { background-color: #9bf6ff; border: 4px solid #00b4d8; color: #0077b6; }
        .btn-3 { background-color: #caffbf; border: 4px solid #4caf50; color: #1b5e20; }
        .btn-4 { background-color: #ffd6a5; border: 4px solid #ff9800; color: #e65100; }
        .btn-5 { background-color: #bdb2ff; border: 4px solid #673ab7; color: #311b92; }
        .btn-6 { background-color: #ffc6ff; border: 4px solid #e91e63; color: #880e4f; }
        .btn-7 { background-color: #a0c4ff; border: 4px solid #3f51b5; color: #1a237e; }
        .btn-8 { background-color: #fdffb6; border: 4px solid #fbc02d; color: #f57f17; }

        .footer {
            margin-top: 20px;
            font-size: 12pt;
            color: #78909c;
            line-height: 1.4;
        }
        .deco { font-size: 20pt; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="deco">🚀</span> 趣味方程實驗室 <span class="deco">🧪</span></h1>
        <p class="subtitle">小朋友，選一個挑戰開始吧！</p>
        
        <div class="grid">
            <a href="EquationBalancLab1.html" class="btn btn-1">
                <span class="num">1</span>
                <span class="symbol">＋</span>
                <span class="text">加法方程</span>
            </a>
            <a href="EquationBalancLab2.html" class="btn btn-2">
                <span class="num">2</span>
                <span class="symbol">－</span>
                <span class="text">減法方程</span>
            </a>
            <a href="EquationBalancLab3.html" class="btn btn-3">
                <span class="num">3</span>
                <span class="symbol">×</span>
                <span class="text">乘法方程</span>
            </a>
            <a href="EquationBalancLab4.html" class="btn btn-4">
                <span class="num">4</span>
                <span class="symbol">÷</span>
                <span class="text">除法方程</span>
            </a>
            <a href="EquationBalancLab5.html" class="btn btn-5 btn-composite">
                <span class="num">5</span>
                <span class="symbol">× ＋</span>
                <span class="text">先乘後加</span>
            </a>
            <a href="EquationBalancLab6.html" class="btn btn-6 btn-composite">
                <span class="num">6</span>
                <span class="symbol">× －</span>
                <span class="text">先乘後減</span>
            </a>
            <a href="EquationBalancLab7.html" class="btn btn-7 btn-composite">
                <span class="num">7</span>
                <span class="symbol">÷ ＋</span>
                <span class="text">先除後加</span>
            </a>
            <a href="EquationBalancLab8.html" class="btn btn-8 btn-composite">
                <span class="num">8</span>
                <span class="symbol">÷ －</span>
                <span class="text">先除後減</span>
            </a>
        </div>
        
        <div class="footer">
            🌟 提示：建議使用 <b>直向 (Portrait)</b> 獲得最佳體驗。<br>
            由 1-4 號開始，想挑戰更難的就選 5-8 號吧！
        </div>
    </div>
</body>
</html>
